<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KROSS</title>
<link rel="icon" href="data:image/x-icon;,"> <!-- подавляет запрос favicon -->
<link rel="stylesheet" href="style.css">
<script src="https://telegram.org/js/telegram-web-app.js" onerror="console.warn('Telegram WebApp not available')"></script>
</head>
<body class="theme-light">

<button class="show-header-btn" id="showHeaderBtn" style="display:none;">▼</button>

<div class="app-container">
  <header class="header" id="mainHeader">
    <div class="title-row">
      <div class="title">KROSS</div>
      <div class="header-controls">
        <button class="font-btn" id="fontDecrease">A-</button>
        <button class="font-btn" id="fontIncrease">A+</button>
        <button class="theme-toggle" id="themeToggle">🌙 Ночная</button>
        <button class="save-progress-btn" id="saveProgressBtn">💾 Сохранить</button>
        <button class="toggle-header-btn" id="toggleHeaderBtn">▲</button>
      </div>
    </div>
    <div class="subtitle">часть 1</div>
  </header>

  <main class="content">
    <div class="page-container" id="pageContainer">
      <div class="page-content" id="pageContent"></div>
    </div>
  </main>

  <footer class="footer">
    <span class="page-indicator" id="pageIndicator">1 / 1</span>
    <select class="chapter-selector" id="chapterSelect"></select>
    <div class="nav-buttons">
      <button class="nav-btn" id="prevPage">⬆️</button>
      <button class="nav-btn" id="nextPage">⬇️</button>
    </div>
  </footer>
</div>

<script src="app.js"></script>
<script src="kross-tracker.js"></script>
</body>
</html>
